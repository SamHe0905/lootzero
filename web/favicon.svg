<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges" width="64" height="64">
  <!-- Loot Zero favicon: moeda dourada com "LZ" em pixel-art -->
  <rect width="16" height="16" fill="#5C94FC"/>
  <!-- Borda da moeda -->
  <rect x="3" y="1" width="10" height="1" fill="#1A1A1A"/>
  <rect x="2" y="2" width="12" height="1" fill="#1A1A1A"/>
  <rect x="1" y="3" width="14" height="1" fill="#1A1A1A"/>
  <rect x="1" y="4" width="14" height="8" fill="#1A1A1A"/>
  <rect x="2" y="12" width="12" height="1" fill="#1A1A1A"/>
  <rect x="3" y="13" width="10" height="1" fill="#1A1A1A"/>
  <!-- Preenchimento dourado -->
  <rect x="3" y="2" width="10" height="1" fill="#FAC000"/>
  <rect x="2" y="3" width="12" height="1" fill="#FAC000"/>
  <rect x="2" y="4" width="12" height="8" fill="#FAC000"/>
  <rect x="3" y="12" width="10" height="1" fill="#FAC000"/>
  <!-- Sombra interna direita -->
  <rect x="12" y="4" width="1" height="8" fill="#C89000"/>
  <rect x="3" y="11" width="10" height="1" fill="#C89000"/>
  <!-- Letras LZ em roxo -->
  <rect x="4" y="5" width="1" height="6" fill="#6E3FB8"/>
  <rect x="5" y="10" width="2" height="1" fill="#6E3FB8"/>
  <rect x="8" y="5" width="4" height="1" fill="#6E3FB8"/>
  <rect x="11" y="6" width="1" height="1" fill="#6E3FB8"/>
  <rect x="10" y="7" width="1" height="1" fill="#6E3FB8"/>
  <rect x="9" y="8" width="1" height="1" fill="#6E3FB8"/>
  <rect x="8" y="9" width="1" height="1" fill="#6E3FB8"/>
  <rect x="8" y="10" width="4" height="1" fill="#6E3FB8"/>
</svg>
