<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Loot Zero — Orçamento Base Zero com estética 16-bit RPG.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Loot Zero">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5C94FC">

  <title>Loot Zero</title>

  <style>
    body { margin: 0; background: #5C94FC; font-family: monospace; overflow: hidden; }

    /* Céu com gradiente sutil */
    #lz-loader {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px;
      background: linear-gradient(180deg, #5C94FC 0%, #7BAAFF 60%, #5C94FC 100%);
      image-rendering: pixelated;
    }

    /* Nuvens pixeladas */
    .lz-cloud {
      position: absolute;
      width: 88px; height: 28px;
      background: #fff;
      box-shadow:
        0 -10px 0 #fff inset,
        20px -16px 0 #fff,
        -20px -10px 0 #fff;
      border-radius: 0;
    }
    .lz-cloud::before, .lz-cloud::after {
      content: ''; position: absolute; background: #fff;
    }
    .lz-cloud-1 { top: 12%;  left: 8%;  animation: drift1 22s linear infinite; }
    .lz-cloud-2 { top: 22%;  right: 14%; animation: drift2 28s linear infinite; }
    .lz-cloud-3 { bottom: 24%; left: 18%; animation: drift1 26s linear infinite; }

    @keyframes drift1 {
      0%   { transform: translateX(-40px); }
      100% { transform: translateX(40px); }
    }
    @keyframes drift2 {
      0%   { transform: translateX(40px); }
      100% { transform: translateX(-40px); }
    }

    /* Moeda — SVG embutido com animação de "flip" via keyframes */
    .lz-coin-wrap {
      width: 88px; height: 88px;
      animation: lz-flip 1.2s ease-in-out infinite;
      filter: drop-shadow(6px 6px 0 #1A1A1A);
    }
    @keyframes lz-flip {
      0%   { transform: scaleX(1) rotateY(0deg); }
      45%  { transform: scaleX(0.12); }
      50%  { transform: scaleX(0.05); }
      55%  { transform: scaleX(0.12); }
      100% { transform: scaleX(1); }
    }

    .lz-title {
      font-weight: bold;
      letter-spacing: 4px;
      font-size: 14px;
      color: #FFFFFF;
      text-shadow: 3px 3px 0 #1A1A1A;
      margin: 0;
      text-align: center;
    }

    .lz-bar {
      width: 220px; height: 16px;
      background: #1A1A1A;
      border: 3px solid #1A1A1A;
      box-shadow: 4px 4px 0 #1A1A1A;
      position: relative;
      overflow: hidden;
    }
    .lz-bar::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        90deg,
        #1FB55C 0 12px,
        #0D7A38 12px 14px
      );
      animation: lz-bar 2s linear infinite;
      transform-origin: left center;
    }
    @keyframes lz-bar {
      0%   { width: 8%;  }
      50%  { width: 65%; }
      100% { width: 100%;}
    }

    /* Grama no rodapé */
    .lz-grass {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 56px;
      background:
        linear-gradient(180deg, transparent 0%, #1FB55C 8px, #1FB55C 100%);
      box-shadow: inset 0 -8px 0 #0D7A38;
    }
    .lz-grass::before {
      content: ''; position: absolute; left: 0; right: 0; top: 0;
      height: 12px;
      background:
        radial-gradient(circle at 8px 12px, #1FB55C 4px, transparent 5px),
        radial-gradient(circle at 24px 8px,  #1FB55C 4px, transparent 5px),
        radial-gradient(circle at 40px 12px, #1FB55C 4px, transparent 5px);
      background-size: 48px 12px;
    }
  </style>
</head>
<body>
  <div id="lz-loader">
    <div class="lz-cloud lz-cloud-1"></div>
    <div class="lz-cloud lz-cloud-2"></div>
    <div class="lz-cloud lz-cloud-3"></div>

    <div class="lz-coin-wrap">
      <svg viewBox="0 0 16 16" shape-rendering="crispEdges" width="88" height="88">
        <!-- contorno -->
        <rect x="4" y="0" width="8" height="1" fill="#1A1A1A"/>
        <rect x="2" y="1" width="12" height="1" fill="#1A1A1A"/>
        <rect x="1" y="2" width="14" height="1" fill="#1A1A1A"/>
        <rect x="0" y="3" width="16" height="10" fill="#1A1A1A"/>
        <rect x="1" y="13" width="14" height="1" fill="#1A1A1A"/>
        <rect x="2" y="14" width="12" height="1" fill="#1A1A1A"/>
        <rect x="4" y="15" width="8" height="1" fill="#1A1A1A"/>
        <!-- preenchimento dourado -->
        <rect x="4" y="1" width="8" height="1" fill="#FAC000"/>
        <rect x="2" y="2" width="12" height="1" fill="#FAC000"/>
        <rect x="1" y="3" width="14" height="10" fill="#FAC000"/>
        <rect x="2" y="13" width="12" height="1" fill="#FAC000"/>
        <rect x="4" y="14" width="8" height="1" fill="#FAC000"/>
        <!-- highlight superior esquerdo -->
        <rect x="5" y="1" width="3" height="1" fill="#FFE066"/>
        <rect x="3" y="2" width="2" height="1" fill="#FFE066"/>
        <rect x="2" y="3" width="2" height="1" fill="#FFE066"/>
        <rect x="1" y="4" width="1" height="3" fill="#FFE066"/>
        <!-- sombra inferior direita -->
        <rect x="13" y="4" width="2" height="9" fill="#C89000"/>
        <rect x="12" y="12" width="1" height="1" fill="#C89000"/>
        <rect x="3" y="13" width="11" height="1" fill="#C89000"/>
        <!-- "L" + "Z" central -->
        <rect x="5" y="5" width="1" height="6" fill="#6E3FB8"/>
        <rect x="6" y="10" width="2" height="1" fill="#6E3FB8"/>
        <rect x="9" y="5" width="3" height="1" fill="#6E3FB8"/>
        <rect x="11" y="6" width="1" height="1" fill="#6E3FB8"/>
        <rect x="10" y="7" width="1" height="1" fill="#6E3FB8"/>
        <rect x="9" y="8" width="1" height="1" fill="#6E3FB8"/>
        <rect x="8" y="9" width="1" height="1" fill="#6E3FB8"/>
        <rect x="9" y="10" width="3" height="1" fill="#6E3FB8"/>
      </svg>
    </div>

    <p class="lz-title">CARREGANDO LOOT ZERO...</p>
    <div class="lz-bar"></div>

    <div class="lz-grass"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', () => {
      const el = document.getElementById('lz-loader');
      if (el) {
        el.style.transition = 'opacity 0.4s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      }
    });
  </script>
</body>
</html>
